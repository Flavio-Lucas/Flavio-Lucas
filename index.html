<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css?v=4">
  <link rel="stylesheet" href="./home.css?v=4">
  <link rel="stylesheet" href="./projects.css?v=4">
  <link rel="stylesheet" href="./contact.css?v=4">
  <script src="data/sections.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/contacts.js"></script>
  <script src="data/projects.js"></script>
  <script src="app.js" defer></script>
  <title>Flávio Lucas</title>
</head>

<body>
  <input type="checkbox" name="menu" id="menu-input">

  <img src="images/menu.svg" alt="Menu" id="menu-icon" onclick="document.getElementById('menu-input').click()">

  <nav id="nav" onclick="document.getElementById('menu-input').checked = false">
    <!-- populated by app.js -->
  </nav>

  <!-- ── Home ── -->
  <section id="home">
    <aside>
      <h1>Flávio Lucas</h1>
      <h2>Software Engineer</h2>
      <span>Full Stack Developer</span>

      <a class="curriculum" download target="_blank" href="./download/cv.pdf">
        Curriculum
        <img src="./images/download.svg">
      </a>
    </aside>
    <div class="image-container">
      <div class="spacer"></div>
      <div class="image-box">
        <img class="banner-image" src="images/background-home.png" alt="">
      </div>
    </div>
    <button class="section-arrow" aria-label="Next section">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </section>

  <!-- ── Experience ── -->
  <section id="experience">
    <button class="exp-nav exp-nav-prev" onclick="scrollExp(-1)" aria-label="Previous">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="exp-track" id="exp-track">
      <!-- populated by app.js -->
    </div>
    <button class="exp-nav exp-nav-next" onclick="scrollExp(1)" aria-label="Next">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <button class="section-arrow" aria-label="Next section">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </section>

  <!-- ── Projects (controlled by data/sections.js) ── -->
  <section id="projects">
    <button class="proj-nav proj-nav-prev" onclick="scrollProj(-1)" aria-label="Previous">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="proj-track" id="proj-track">
      <!-- populated by app.js -->
    </div>
    <button class="proj-nav proj-nav-next" onclick="scrollProj(1)" aria-label="Next">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <button class="section-arrow" aria-label="Next section">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </section>

  <!-- ── Contact ── -->
  <section id="contact">
    <div class="contact-intro">
      <h1>Get in<br><span class="contact-accent">touch.</span></h1>
      <p class="contact-subtitle">Open to new opportunities<br>and collaborations.</p>
    </div>
    <div class="contact-section" id="contact-section">
      <!-- populated by app.js -->
    </div>
  </section>

  <!-- ── Experience modal ── -->
  <div id="exp-modal" aria-modal="true" role="dialog">
    <div class="modal-card">
      <div class="card-topbar">
        <button class="modal-close" onclick="closeModal()" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-content"></div>
    </div>
  </div>

  <!-- ── Quick-access floating bar ── -->
  <div id="access">
    <a target="_blank" href="https://www.linkedin.com/in/developerflaviolucas/">
      <img src="images/linkedin.svg" alt="Linkedin">
    </a>
    <a target="_blank" href="https://github.com/Flavio-Lucas">
      <img src="images/github.svg" alt="GitHub">
    </a>
    <a href="#contact">
      <img src="images/email.svg" alt="Email">
    </a>
  </div>
</body>

</html>
